# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

service:
  auth: false
  base-path: /transactions
  endpoints:
    quote:
      docs: Get swap quote
      method: GET
      path: /quote
      response: Quote
      errors:
        - QuoteError
        - BadQuoteRequest
      request:
        name: GetQuoteRequest
        query-parameters:
          inputMint: string
          outputMint: string
          amount: string
          slippageBps: optional<integer>
          maxAccounts: optional<integer>
      examples:
        - query-parameters:
            inputMint: So11111111111111111111111111111111111111112
            outputMint: usdkyPPxgV7sfNyKb8eDz66ogPrkRXG3wS2FVb6LLUf
            amount: '1000000'
          response:
            body:
              quoteId: 'abc1234356'
              inputMint: So11111111111111111111111111111111111111112
              inAmount: '100000000'
              outputMint: usdkyPPxgV7sfNyKb8eDz66ogPrkRXG3wS2FVb6LLUf
              outAmount: '16198753'
              slippageBps: 50
              priceImpactPct: '0'
              routePlan:
                - swapInfo:
                    ammKey: 5BKxfWMbmYBAEWvyPZS9esPducUba9GqyMjtLCfbaqyF
                    label: Meteora DLMM
                    inputMint: So11111111111111111111111111111111111111112
                    outputMint: usdkyPPxgV7sfNyKb8eDz66ogPrkRXG3wS2FVb6LLUf
                    inAmount: '100000000'
                    outAmount: '16198753'
                    feeAmount: '24825'
                    feeMint: So11111111111111111111111111111111111111112
                  percent: 100

    swap:
      docs: Get swap transaction
      method: GET
      path: /swap
      response: Transaction
      errors:
        - QuoteNotFound
        - SimulationFailed
      request:
        name: GetSwapRequest
        query-parameters:
          quoteId: string
          userPublicKey: string
      examples:
        - query-parameters:
            quoteId: 'abc1234356'
            userPublicKey: 'D76ySoHPwD8U2nnTTDqXeUJQg5UkD9UD1PUE1rnvPAGm'
          response:
            body:
              transaction: 'AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAQAGDkS+3LuGTbs......+/oD9qb31dH6i0QZ2IHELXUX3Y1YeW79p9Stkqk12z4yvZFJiQ4GCQwLBwYQBgUEDggNTQ=='
              simulationLogs:
                - Transaction successful
              luts:
                - 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
              instructions:
                - programId: 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
                  data: 3Bxs6mXg8fV7jXg5c6kUeXoGx5r4
                  keys:
                    - pubkey: 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
                      isSigner: false
                      isWritable: true

    bridge:
      docs: Get bridge transaction
      method: GET
      path: /bridge
      response: Transaction
      errors:
        - BadBridgeRequest
        - SimulationFailed
      request:
        name: GetBridgeRequest
        query-parameters:
          userPublicKey: string
          fromChain: string
          toChain: string
          amount: string
          recipientAddress: string
          outboxItem: optional<string>
      examples:
        - query-parameters:
            fromChain: 'Ethereum'
            toChain: 'Solana'
            amount: '1000000'
            userPublicKey: 'D76ySoHPwD8U2nnTTDqXeUJQg5UkD9UD1PUE1rnvPAGm'
            recipientAddress: '0x77BAB32F75996de8075eBA62aEa7b1205cf7E004'
          response:
            body:
              transaction: 'AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAQAGDkS+3LuGTbs......+/oD9qb31dH6i0QZ2IHELXUX3Y1YeW79p9Stkqk12z4yvZFJiQ4GCQwLBwYQBgUEDggNTQ=='
              simulationLogs:
                - Transaction successful
              luts:
                - 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
              instructions:
                - programId: 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
                  data: 3Bxs6mXg8fV7jXg5c6kUeXoGx5r4
                  keys:
                    - pubkey: 9JLRqBqkznKiSoNfotA4ywSRdnWb2fE76SiFrAfkaRCD
                      isSigner: false
                      isWritable: true

types:
  Quote:
    properties:
      quoteId: string
      inputMint: string
      inAmount: string
      outputMint: string
      outAmount: string
      slippageBps: integer
      priceImpactPct: string
      routePlan: list<RoutePlan>

  RoutePlan:
    properties:
      percent: integer
      swapInfo: SwapInfo

  SwapInfo:
    properties:
      ammKey: string
      label: string
      inputMint: string
      outputMint: string
      inAmount: string
      outAmount: string
      feeAmount: string
      feeMint: string

  Transaction:
    properties:
      transaction: string
      instructions: list<Instruction>
      luts: list<string>
      simulationLogs: list<string>

  Instruction:
    properties:
      programId: string
      data: string
      keys: list<AccountMeta>

  AccountMeta:
    properties:
      pubkey: string
      isSigner: boolean
      isWritable: boolean

  ErrorWithMessage:
    properties:
      message: string

  SwapRequestError:
    properties:
      message: string
      logs: optional<list<string>>
      b64: optional<string>

errors:
  QuoteNotFound:
    status-code: 404
    type: SwapRequestError

  QuoteError:
    status-code: 500
    type: SwapRequestError

  BadQuoteRequest:
    status-code: 400
    type: SwapRequestError

  BadBridgeRequest:
    status-code: 400
    type: ErrorWithMessage

  SimulationFailed:
    status-code: 500
    type: SwapRequestError
