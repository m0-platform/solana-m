name: setup
description: 'Installing tooling and dependencies for running tests'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  solana-version:
    description: 'Solana version'
    required: false
    default: 'v2.1.0'
  anchor_version:
    description: 'Anchor version'
    required: false
    default: '0.31.1'
runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        components: rustc

    - name: Cache Cargo dependencies
      uses: Swatinem/rust-cache@v2

    - name: Cache Solana CLI
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/solana/
          ~/.local/share/solana/
          ~/.config/solana
          ~/.cargo/bin/anchor
        key: solana-cli-${{ inputs.solana-version }}

    - name: Install Anchor CLI
      run: |
        mkdir -p ~/.local/share/solana
        curl --proto '=https' --tlsv1.2 -sSfL https://solana-install.solana.workers.dev | bash
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      shell: bash

    - name: Install Anchor CLI
      shell: bash
      if: steps.cache-anchor-cli.outputs.cache-hit != 'true' && inputs.anchor_version != ''
      run: |
        cargo install --git https://github.com/coral-xyz/anchor --tag "v${{ inputs.anchor_version  }}" anchor-cli --force
        anchor --version

    - name: Cache node_modules
      uses: actions/cache@v3
      with:
        path: ./node_modules/
        key: node-modules-${{ inputs.node-version }}

    - name: Install Node Dependencies
      run: npm i -g pnpm && pnpm install
      shell: bash

    - name: Build test programs
      run: |
        make build-test-earn-programs
        make build-test-swap-program
      shell: bash

    - name: Build programs
      run: |
        anchor build -p earn
        anchor build -p ext_earn
        anchor build -p portal --no-idl
      shell: bash
